poll_cron: '0 * * * *'
user_agent: 'change-detector/0.2-local'

runtime:
  max_parallel_watches: 2
  per_watch_jitter_ms: 200
  run_lease_ttl_sec: 300

message:
  url: 'https://ntfy.sh/deno-test-000'
  auth_env: 'NTFY_AUTH_TOKEN'
  retry:
    max_attempts: 3
    base_delay_ms: 500
    max_delay_ms: 5000
    jitter_ms: 250

watch_defaults:
  timeout_ms: 10000
  method: 'GET'
  notify_on_first_observation: false
  jsonpath: '$.tag_name'

watches:
  - name: 'navidrome release'
    url: 'https://api.github.com/repos/navidrome/navidrome/releases/latest'
    jsonpath: '$.tag_name'
    auth_env: 'GITHUB_TOKEN'
    auth_prefix: 'token '
    headers:
      accept: 'application/vnd.github+json'

  - name: 'ntfy release'
    url: 'https://api.github.com/repos/binwiederhier/ntfy/releases/latest'
    jsonpath: '$.tag_name'
    auth_env: 'GITHUB_TOKEN'
    auth_prefix: 'token '
    headers:
      accept: 'application/vnd.github+json'

  
  - name: 'OpenAI-jobs'
    url: 'https://api.ashbyhq.com/posting-api/job-board/openai'
    jsonpath: '$.jobs[*].title'
